# Netlify configuration for SEQ MyLearning App
# Last updated: 2026-01-29

[build]
  command = "npm run build"
  publish = "dist"

# Force devDependencies install (needed for TypeScript)
[build.environment]
  NPM_FLAGS = "--include=dev"

# Environment variables (set these in Netlify UI for security)
# - VITE_SUPABASE_URL
# - VITE_SUPABASE_ANON_KEY
# - VITE_GEMINI_API_KEY

# SPA Routing - all routes fall back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers (OWASP recommended)
[[headers]]
  for = "/*"
  [headers.values]
    # HTTPS Enforcement
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # XSS Protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    
    # Permissions Policy - restrict browser features
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    
    # Content Security Policy
    # Note: Adjust 'script-src' and 'connect-src' based on your actual CDNs and APIs
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://*.vimeocdn.com https://*.vimeo.com https://www.youtube.com https://s.ytimg.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https: *;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://generativelanguage.googleapis.com https://*.vimeo.com https://player.vimeo.com https://*.vimeocdn.com https://www.youtube.com https://youtube.com https://*.googlevideo.com;
      frame-src 'self' https://*.vimeo.com https://player.vimeo.com https://www.youtube.com https://youtube.com;
      media-src 'self' https://*.vimeo.com https://player.vimeo.com https://*.googlevideo.com blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
    '''

# Cache static assets (JS, CSS, images)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML (always fetch fresh for SPA)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Don't cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Preview deploys configuration
[context.deploy-preview]
  command = "npm run build"

# Branch deploys configuration
[context.branch-deploy]
  command = "npm run build"

# Production context
[context.production]
  command = "npm run build"
  environment = { NODE_ENV = "production" }
